services:
  status:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - SERVICES_FILE=/services.yaml
    volumes:
      - ./services.yaml:/services.yaml:ro
    read_only: true                  
    security_opt:
      - no-new-privileges:true       
    cap_drop:
      - ALL
    network_mode: host